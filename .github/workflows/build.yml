name: Build CrowsNest APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrowsNest-APK
          path: app/build/outputs/apk/release/app-release.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: v2.0.0
          name: "CrowsNest v2.0.0 — All-in-One"
          body: |
            🪝 **CrowsNest v2.0.0 — All-in-One APK**
            
            **Quarterdeck HUD built in.** No Play Store. No separate web pages. Just install and go.
            
            ### What's Inside
            - 📋 **Quarterdeck HUD** — Task board, progress, next action — all on one screen
            - 📡 **Phone Status Sync** — Battery, location, WiFi, Bluetooth, app tracking
            - 🎵 **Music Detection** — Currently playing song tracking
            - 🏃 **Step Counter** — Built-in pedometer
            - 📊 **Screen Time** — Today's usage stats with top apps
            - 🔔 **Gotify Push** — Receives nudges from CPT-Hook fleet
            - 🔄 **Auto-Sync** — Fetches tasks every 30 seconds
            
            ### Install
            1. Download the APK below
            2. Sideload on your phone (enable "Unknown Sources")
            3. Grant permissions when prompted
            4. Configure Quarterdeck URL in Settings tab
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
